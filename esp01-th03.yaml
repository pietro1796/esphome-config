# Pietro Customizations #
substitutions:
  device_name: esp01-th03
  place: Camera
  friendly_name: TH-${place}
  ip_addres: 192.168.100.43
  platform: esp8266
  board: esp01_1m


# COMMON CONFIG
packages:
  common: !include packages/common.yaml

###################
## DEVICE CONFIG ##
###################

sensor:
  - platform: dht
    pin: 2
    temperature:
      name: "Temperatura ${place}"
      filters:
        - round: 1
        - offset: -9.9
    humidity:
      name: "Umidità ${place}"
      internal: True
    update_interval: 60s